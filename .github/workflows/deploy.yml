name: Build and Deploy to Static.app

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to Static.app
        uses: designmodo/static-app-deploy-action@v1.0.0
        with:
          api-key: ${{ secrets.STATIC_APP_API_KEY }}
          # Optional: set STATIC_APP_PID in repo secrets to update an existing
          # site rather than creating a new one on each deploy.
          pid: ${{ secrets.STATIC_APP_PID }}
          build-dir: dist
          build-command: npm run build
          install-command: npm ci
          node-version: "20"

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME # TODO: Replace with your repo
  branch: main
  base_url: https://api.netlify.com # Required for OAuth; or use Netlify Identity
  auth_endpoint: auth

# Uncomment to enable local dev backend (no GitHub required for testing)
# local_backend: true

media_folder: public/uploads
public_folder: /uploads

site_url: https://your-domain.com # TODO: Replace
display_url: https://your-domain.com # TODO: Replace

collections:
  # Pages collection
  - name: pages
    label: Pages
    folder: src/content/pages
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - {
          label: Description,
          name: description,
          widget: string,
          required: false,
        }
      - { label: Date, name: date, widget: datetime, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # Posts collection
  - name: posts
    label: Blog Posts
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - {
          label: Description,
          name: description,
          widget: string,
          required: false,
        }
      - { label: Date, name: date, widget: datetime }
      - { label: Tags, name: tags, widget: list, default: [], required: false }
      - { label: Author, name: author, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # Lists collection
  - name: lists
    label: Lists
    folder: src/content/lists
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    fields:
      - { label: Title, name: title, widget: string }
      - label: Items
        name: items
        widget: list
        fields:
          - { label: Label, name: label, widget: string }
          - { label: Value, name: value, widget: string }

  # Theme settings
  - name: theme
    label: Theme
    files:
      - label: Theme Settings
        name: theme
        file: src/theme.json
        fields:
          - {
              label: Primary Color,
              name: primaryColor,
              widget: color,
              default: "#2563eb",
            }
          - {
              label: Secondary Color,
              name: secondaryColor,
              widget: color,
              default: "#7c3aed",
            }
          - {
              label: Font Family,
              name: fontFamily,
              widget: string,
              default: "system-ui, sans-serif",
            }
          - {
              label: Font Scale,
              name: fontScale,
              widget: number,
              default: 1,
              value_type: float,
              min: 0.75,
              max: 1.5,
              step: 0.05,
            }
          - {
              label: Border Radius,
              name: borderRadius,
              widget: string,
              default: "0.5rem",
            }
          - label: Layout Style
            name: layoutStyle
            widget: select
            options: [centered, wide, full]
            default: centered

  # Site Settings
  - name: settings
    label: Settings
    files:
      - label: Site Settings
        name: main
        file: src/content/settings/main.json
        fields:
          - { label: Site Title, name: siteTitle, widget: string }
          - { label: Site Description, name: siteDescription, widget: string }
          - { label: Site URL, name: siteUrl, widget: string, required: false }
          - { label: Logo, name: logo, widget: image, required: false }
          - label: Navigation
            name: nav
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
          - {
              label: Footer Text,
              name: footer,
              widget: string,
              required: false,
            }
